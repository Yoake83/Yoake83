<svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
  <!-- tail -->
  <ellipse cx="70" cy="270" rx="26" ry="16" fill="#f5f5f5" stroke="#111" stroke-width="5"/>

  <!-- back paws -->
  <ellipse cx="108" cy="292" rx="22" ry="14" fill="#f5f5f5" stroke="#111" stroke-width="5"/>
  <ellipse cx="192" cy="292" rx="22" ry="14" fill="#f5f5f5" stroke="#111" stroke-width="5"/>

  <!-- body -->
  <path d="M150 130
           C 90 130, 70 190, 78 240
           C 84 275, 116 295, 150 295
           C 184 295, 216 275, 222 240
           C 230 190, 210 130, 150 130 Z"
        fill="#fbfbfb" stroke="#111" stroke-width="6"/>

  <!-- front paws / arms crossed in lap -->
  <ellipse cx="122" cy="248" rx="24" ry="18" fill="#20242c" stroke="#111" stroke-width="5"/>
  <ellipse cx="178" cy="248" rx="24" ry="18" fill="#20242c" stroke="#111" stroke-width="5"/>

  <!-- back legs (small black feet peeking out) -->
  <ellipse cx="108" cy="292" rx="14" ry="9" fill="#20242c" stroke="#111" stroke-width="4"/>
  <ellipse cx="192" cy="292" rx="14" ry="9" fill="#20242c" stroke="#111" stroke-width="4"/>

  <!-- ears -->
  <circle cx="100" cy="72" r="30" fill="#20242c" stroke="#111" stroke-width="6"/>
  <circle cx="200" cy="72" r="30" fill="#20242c" stroke="#111" stroke-width="6"/>

  <!-- head -->
  <circle cx="150" cy="120" r="78" fill="#fbfbfb" stroke="#111" stroke-width="6"/>

  <!-- eye patches -->
  <ellipse cx="115" cy="122" rx="26" ry="32" fill="#20242c" stroke="#111" stroke-width="5" transform="rotate(-8 115 122)"/>
  <ellipse cx="185" cy="122" rx="26" ry="32" fill="#20242c" stroke="#111" stroke-width="5" transform="rotate(8 185 122)"/>

  <!-- eyes (big cute cartoon eyes) -->
  <circle cx="117" cy="128" r="15" fill="#fdfdfd" stroke="#111" stroke-width="3.5"/>
  <circle cx="183" cy="128" r="15" fill="#fdfdfd" stroke="#111" stroke-width="3.5"/>
  <circle cx="120" cy="132" r="7" fill="#111"/>
  <circle cx="180" cy="132" r="7" fill="#111"/>
  <circle cx="123" cy="128" r="2.2" fill="#fff"/>
  <circle cx="183" cy="128" r="2.2" fill="#fff"/>

  <!-- nose -->
  <ellipse cx="150" cy="152" rx="10" ry="7" fill="#111"/>

  <!-- mouth -->
  <path d="M150 159 Q150 172 134 178" stroke="#111" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M150 159 Q150 172 166 178" stroke="#111" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="98" cy="148" rx="10" ry="6" fill="#F2B759" opacity="0.6"/>
  <ellipse cx="202" cy="148" rx="10" ry="6" fill="#F2B759" opacity="0.6"/>
</svg>
